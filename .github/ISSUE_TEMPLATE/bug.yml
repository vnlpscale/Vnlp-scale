name: Bug report
description: Report a reproducible defect
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Summary
      description: What failed, and what did you expect?
    validations:
      required: true
  - type: input
    attributes:
      label: Vnlp-scale version or commit
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Include the smallest command or code sample that reproduces the issue.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: OS, Python, NumPy, safetensors, backend, hardware, and filesystem.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Store verification
      description: Paste `vnlp-scale verify --store ...` output when applicable.
