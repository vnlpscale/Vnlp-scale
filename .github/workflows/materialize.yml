name: Materialize release candidate

on:
  push:
    branches: ["release/v0.1.0"]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct validated source
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/source.part00 .bootstrap/source.part01 .bootstrap/source.part02 .bootstrap/source.part03 > /tmp/vnlp-scale-source.zip
          echo "601e96f24a0ff7e3fd29fa94702819205db73ee1ad7bd19b8e093457e0fdd4fd  /tmp/vnlp-scale-source.zip" | sha256sum -c -
          work="$(mktemp -d)"
          unzip -q /tmp/vnlp-scale-source.zip -d "$work"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$work/Vnlp-scale-0.1.0/." .
      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Vnlp-scale v0.1.0 release candidate"
          git push origin HEAD:release/v0.1.0
