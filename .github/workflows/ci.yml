name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest --cov=vnlp_scale --cov-report=term-missing --cov-fail-under=80

  torch-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,torch]'
      - run: pytest tests/test_engine.py tests/test_fused_linear.py -q

  build-and-installed-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: vnlp-scale --version
      - run: python examples/create_synthetic.py /tmp/vnlp-source
      - run: vnlp-scale record --source /tmp/vnlp-source --output /tmp/vnlp-store --quality med --chunk-mib 1 --json
      - run: vnlp-scale verify --store /tmp/vnlp-store
      - run: vnlp-scale run --store /tmp/vnlp-store --prompt-ids 1,2,3 --max-new 2 --backend numpy --verify --json
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
